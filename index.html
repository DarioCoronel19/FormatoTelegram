<!--DARIO CORONEL-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Falla RB</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="app-container">
        
        <div class="content-panel">
            
            <div class="step-content">
                
                <div class="form-card">
                    
                    <div class="header">
                        <div class="header-left">
                            <div class="logo" id="radiobaseIcon">
                                <i class="fas fa-tower-cell"></i>
                                <i class="fas fa-tower-broadcast"></i>
                            </div>
                            <span class="app-title">Reporte Falla RB</span>
                            <!-- Footer inside header -->
                            <span class="header-footer">Creado por <strong>Dario Coronel</strong></span>
                        </div>
                        
                        <div class="header-center">
                            <div class="ticket-input-wrapper">
                                <label for="ticketNumber">No Ticket</label>
                                <input type="text" id="ticketNumber" value="" class="ticket-input">
                            </div>
                            
                            <div class="title-input-wrapper">
                                <label for="titleInput">Título</label>
                                <input type="text" id="titleInput" value="FALLA RB" class="title-input">
                            </div>
                        </div>
                        
                        <div class="header-right">
                            <button class="theme-toggle" onclick="toggleDark()" aria-label="Cambiar tema">
                                <i class="fas fa-sun"></i>
                                <i class="fas fa-moon"></i>
                            </button>
                        </div>
                    </div>

                    <table>

                        <tr>
                            <td class="label">Plaza</td>
                            <td class="input centrado">

                                <select id="plaza" class="custom-select">

                                    <option value="">Seleccionar</option>

                                    <option value="Celaya">Celaya</option>
                                    <option value="Guadalajara">Guadalajara</option>
                                    <option value="Leon">Leon</option>
                                    <option value="Merida">Merida</option>
                                    <option value="Monclova">Monclova</option>
                                    <option value="Monterrey">Monterrey</option>
                                    <option value="NuevoLaredo">NuevoLaredo</option>
                                    <option value="PiedrasNegras">PiedrasNegras</option>
                                    <option value="Puebla">Puebla</option>
                                    <option value="Queretaro">Queretaro</option>
                                    <option value="Reynosa">Reynosa</option>
                                    <option value="Sabinas">Sabinas</option>
                                    <option value="Saltillo">Saltillo</option>
                                    <option value="SanLuisPotosi">SanLuisPotosi</option>
                                    <option value="Tampico">Tampico</option>
                                    <option value="Torreon">Torreon</option>

                                </select>

                            </td>
                        </tr>


                        <tr>
                            <td class="label">Tipo de Afectación</td>

                            <td class="input centrado tipoAfectacionCell">

                                <select id="tipoAfectacion" class="custom-select">

                                    <option value="">Seleccionar</option>
                                    <option> 🔴 Total</option>
                                    <option> 🟡 Parcial</option>
                                    <option> 🟢 Sin afectación para clientes</option>

                                </select>

                            </td>
                        </tr>


                        <tr>
                            <td class="label radiobaseLabel">Radiobase</td>

                            <td class="input radiobaseCell centrado">

                                <select id="radiobase" class="custom-select">
                                    <option>Seleccione plaza</option>
                                </select>

                            </td>
                        </tr>


                        <tr>
                            <td class="label rbAfectadasLabel">RB(s) afectadas</td>

                            <td class="input rbAfectadasCell centrado">

                                <input id="rbAfectadas" readonly class="readonly-input">

                            </td>
                        </tr>


                        <tr>
                            <td class="label">Hora de inicio</td>
                            <td class="input centrado">
                                <input type="datetime-local" class="time-input">
                            </td>
                        </tr>


                        <tr>
                            <td class="label">Hora de finalización</td>
                            <td class="input centrado">
                                <input type="datetime-local" class="time-input">
                            </td>
                        </tr>


                        <tr>
                            <td class="label">Tiempo de Afectación</td>

                            <td class="input tiempoCelda centrado">

                                <input id="tiempoAfectacion" class="tiempo-input">

                            </td>

                        </tr>


                        <tr>
                            <td class="label">ETA</td>
                            <td class="input">
                                <input class="eta-input">
                            </td>
                        </tr>


                        <tr>
                            <td class="label">AVANCE / STATUS</td>

                            <td class="input">
                                <textarea id="avance" class="auto-resize"></textarea>
                            </td>

                        </tr>


                        <tr>
                            <td class="label">Solución</td>

                            <td class="input">
                                <textarea id="solucion" class="auto-resize"></textarea>
                            </td>

                        </tr>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="js/app.js">
        // Este script inline muestra un error si los módulos no cargan
        window.addEventListener('error', function(e) {
            if (e.message.includes('Failed to fetch') || e.message.includes('CORS') || e.message.includes('import')) {
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center; font-family: Arial, sans-serif;">
                        <h2 style="color: #ef4444;">⚠️ Error de CORS detectado</h2>
                        <p>El formulario no puede cargarse correctamente.</p>
                        <p style="background: #fef3c7; padding: 15px; border-radius: 8px; margin: 20px 0;">
                            <strong>Solución:</strong> Abre este archivo con un servidor HTTP local, no con doble clic.<br><br>
                            En VSCode: Instala la extensión <strong>"Live Server"</strong> y haz clic en "Go Live"<br>
                            O usa: <code>python -m http.server 8000</code> en la terminal
                        </p>
                        <p style="color: #6b7280; font-size: 12px;">
                            Error: ${e.message}
                        </p>
                    </div>
                `;
            }
        }, true);
    </script>

</body>
</html>
